name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main                # regenerate whenever you push to main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- SNAKE ----------
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Sanmatijain22
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # ---------- TROPHY (self-hosted, never 402s) ----------
      - name: Generate trophy SVG
        uses: ryo-ma/github-profile-trophy@feature/generate-svg
        with:
          username: Sanmatijain22
          output_path: dist/trophy.svg
          theme: tokyonight
          no-frame: "true"
          margin-w: "8"
          row: "1"
          column: "7"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
